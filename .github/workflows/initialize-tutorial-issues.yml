name: Initialize Tutorial Issues

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-step-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issues from steps and addendums
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workspace = process.env.GITHUB_WORKSPACE;

            const requiredDir = path.join(workspace, 'docs', 'steps');
            const optionalDir = path.join(workspace, 'docs', 'addendums');

            if (!fs.existsSync(requiredDir)) {
              core.setFailed('docs/steps directory not found.');
              return;
            }

            const requiredFiles = fs
              .readdirSync(requiredDir)
              .filter((file) => /^\d{2}-.*\.md$/.test(file))
              .filter((file) => !file.startsWith('01-'))
              .sort();

            if (requiredFiles.length === 0) {
              core.setFailed('No required step files found in docs/steps.');
              return;
            }

            const optionalFiles = fs.existsSync(optionalDir)
              ? fs.readdirSync(optionalDir)
                  .filter((file) => /^addendum-.*\.md$/.test(file))
                  .sort()
              : [];

            const files = [
              ...requiredFiles.map((file) => ({
                type: 'required',
                dir: requiredDir,
                file,
                source: path.posix.join('docs', 'steps', file),
              })),
              ...optionalFiles.map((file) => ({
                type: 'optional',
                dir: optionalDir,
                file,
                source: path.posix.join('docs', 'addendums', file),
              })),
            ];

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });

            const existingTitles = new Set(
              existingIssues
                .filter((issue) => !issue.pull_request)
                .map((issue) => issue.title)
            );

            let createdRequired = 0;
            let createdOptional = 0;
            let skipped = 0;

            for (const entry of files) {
              const fullPath = path.join(entry.dir, entry.file);
              const markdown = fs.readFileSync(fullPath, 'utf8').trim();

              const titleMatch = markdown.match(/^#\s+(.+)$/m);
              const title = titleMatch
                ? titleMatch[1].trim()
                : entry.type === 'optional'
                  ? `Optional Addendum ${entry.file}`
                  : `Step ${entry.file}`;

              if (existingTitles.has(title)) {
                core.info(`Skipping existing issue: ${title}`);
                skipped += 1;
                continue;
              }

              const typeLine = entry.type === 'optional'
                ? 'Optional addendum.'
                : 'Required setup step.';

              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: `${markdown}\n\n---\n${typeLine}\nSource: \`${entry.source}\`\nGenerated by **Initialize Tutorial Issues** workflow.`,
              });

              if (entry.type === 'optional') {
                createdOptional += 1;
              } else {
                createdRequired += 1;
              }

              core.info(`Created issue: ${title}`);
            }

            core.summary
              .addHeading('Tutorial Issue Initialization')
              .addRaw(`Created required step issues: ${createdRequired}`)
              .addBreak()
              .addRaw(`Created optional addendum issues: ${createdOptional}`)
              .addBreak()
              .addRaw(`Skipped (already existed): ${skipped}`)
              .write();
